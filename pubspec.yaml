name: scrapwell_partner
description: "Scrapwell Partner - Scrap shop owner app for receiving and managing pickup leads"
publish_to: 'none'
version: 1.0.0+8
environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Design
  google_fonts: ^6.3.2
  smooth_page_indicator: ^2.0.1
  pinput: ^6.0.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0
  firebase_storage: ^13.3.0

  # Location & Maps
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # State & Persistence
  shared_preferences: ^2.3.3

  # Media
  image_picker: ^1.2.1

  # Utilities
  url_launcher: ^6.3.2
  intl: ^0.19.0
  http: ^1.2.2
  flutter_local_notifications: ^19.5.0
  cupertino_icons: ^1.0.8
  audioplayers: ^6.0.0
  in_app_update: ^4.2.3
dependency_overrides:
  vector_math: 2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#064E3B"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  remove_alpha_ios: true
  
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/ringtone/

  generate: true
