name: scrapwell_partner
description: "Scrapwell Partner - Scrap shop owner app for receiving and managing pickup leads"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Design
  google_fonts: ^6.3.2
  gap: ^3.0.1
  smooth_page_indicator: ^2.0.1
  pinput: ^6.0.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0
  firebase_storage: ^13.3.0

  # Location & Maps
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_maps_flutter: ^2.10.0

  # State & Persistence
  shared_preferences: ^2.3.3

  # Media
  image_picker: ^1.2.1

  # Utilities
  url_launcher: ^6.3.2
  intl: ^0.19.0
  http: ^1.2.2
  geoflutterfire_plus: ^0.0.34
  flutter_local_notifications: ^19.5.0
  cupertino_icons: ^1.0.8
  flutter_image_compress: ^2.4.0
  crypto: ^3.0.7

dependency_overrides:
  vector_math: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  generate: true
